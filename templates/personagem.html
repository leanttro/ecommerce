<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ p.nome }} | WANTED</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Rye&display=swap" rel="stylesheet">
<style>
    :root { --primary: #E52521; --bg: #050505; --parchment: #e3d3b3; --dark-wood: #3e2723; }
    body { background-color: var(--bg); color: #fff; font-family: 'Rye', serif; overflow-x: hidden; }
    
    .poster-detail-section {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 60px 20px;
        background: radial-gradient(circle, rgba(62,39,35,0.3) 0%, rgba(5,5,5,1) 100%);
    }

    .wanted-poster {
        background-color: var(--parchment);
        border: 10px solid var(--dark-wood);
        padding: 40px;
        color: var(--dark-wood);
        max-width: 550px;
        width: 100%;
        box-shadow: inset 0 0 60px rgba(139, 69, 19, 0.4), 0 30px 60px rgba(0,0,0,0.9);
        position: relative;
        transform: rotate(-1deg);
    }

    .poster-img {
        width: 100%;
        aspect-ratio: 1/1;
        border: 6px solid var(--dark-wood);
        object-fit: cover;
        filter: sepia(0.7) contrast(1.1);
        margin: 20px 0;
    }

    .info-container {
        max-width: 450px;
        width: 100%;
    }

    .description-box {
        background: rgba(227, 211, 179, 0.05);
        border-left: 4px solid var(--primary);
        padding: 25px;
        font-family: sans-serif;
        color: #ddd;
        line-height: 1.8;
        font-size: 1.1rem;
        border-radius: 0 8px 8px 0;
    }
</style>
</head>
<body>

<nav class="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-black/80 backdrop-blur-md">
    <a href="/{{ loja.slug_url }}/" class="text-white hover:text-red-500 transition"><i data-lucide="arrow-left"></i></a>
    <img src="https://res.cloudinary.com/dzcaxmbjn/image/upload/f_auto,q_auto,w_300/v1773599770/Yellow_4000_x_1180_px_1_xfwlsg.png" class="h-8">
    <div class="w-6"></div>
</nav>

<section class="poster-detail-section flex flex-col lg:flex-row gap-16">
    <div class="wanted-poster" id="poster-anim">
        <h1 class="text-6xl text-center tracking-tighter">WANTED</h1>
        <img src="{{ p.imagem_destaque }}" class="poster-img">
        <p class="text-2xl text-center uppercase tracking-widest">Dead or Alive</p>
        <h2 class="text-5xl text-center my-4 uppercase">{{ p.nome }}</h2>
        <p class="text-4xl text-center text-[#8b0000]">฿ {{ "%.0f"|format(p.preco) if p.preco else '???' }}.000.000</p>
        <p class="text-[10px] text-center mt-6 opacity-40">desenvolvido por www.leanttro.com</p>
    </div>

    <div class="info-container opacity-0" id="info-anim">
        <h3 class="text-4xl text-[var(--primary)] mb-6 uppercase">Ficha Criminal</h3>
        <div class="description-box">
            {{ p.descricao | safe }}
        </div>
        <div class="mt-10">
            <a href="https://wa.me/55{{ loja.whatsapp_comercial }}?text=Eu vi a recompensa do {{ p.nome }}!" class="inline-block bg-[#E52521] text-white px-10 py-4 rounded-full text-xl uppercase font-bold tracking-widest hover:scale-110 transition shadow-2xl">
                RECRUTAR PIRATA
            </a>
        </div>
    </div>
</section>

<script>
    lucide.createIcons();
    gsap.to("#poster-anim", { rotation: 1, duration: 2.5, repeat: -1, yoyo: true, ease: "sine.inOut" });
    gsap.to("#info-anim", { opacity: 1, x: 20, duration: 1, delay: 0.3, ease: "power2.out" });
</script>
</body>
</html>
